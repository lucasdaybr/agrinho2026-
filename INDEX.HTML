<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PlantCare Agro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌱 PlantCare Agro</h1>
    <p class="sub">Monitore suas plantas e cuide da sustentabilidade</p>

    <!-- Formulário -->
    <div class="card">
        <input type="text" id="nomePlanta" placeholder="Nome da planta">
        <input type="number" id="diasRegar" placeholder="Regar a cada quantos dias?">
        <button onclick="adicionarPlanta()">Adicionar Planta</button>
    </div>

    <!-- Lista -->
    <h2>🌿 Suas Plantas</h2>
    <div id="lista"></div>

    <!-- Dica -->
    <div class="dica">
        💡 Dica: Regar corretamente evita desperdício de água e melhora a produção sustentável!
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
